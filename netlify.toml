[build]
publish = "."
functions = "netlify/functions"

[[redirects]]
from = "/api/status"
to = "/.netlify/functions/status"
status = 200

[[redirects]]
from = "/api/start-usage"
to = "/.netlify/functions/start-usage"
status = 200

[[redirects]]
from = "/api/end-usage"
to = "/.netlify/functions/end-usage"
status = 200

[[redirects]]
from = "/api/queue/join"
to = "/.netlify/functions/queue-join"
status = 200

[[redirects]]
from = "/api/queue/cancel"
to = "/.netlify/functions/queue-cancel"
status = 200

[[redirects]]
from = "/api/confirm-usage"
to = "/.netlify/functions/confirm-usage"
status = 200

[[redirects]]
from = "/api/auth/config"
to = "/.netlify/functions/auth-config"
status = 200

[[redirects]]
from = "/api/auth/google"
to = "/.netlify/functions/auth-google"
status = 200

[[redirects]]
from = "/api/auth/reconcile-current"
to = "/.netlify/functions/auth-reconcile-current"
status = 200
